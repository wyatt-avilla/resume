repos:
  - repo: local
    hooks:
      - id: check-fmt
        name: Run typstyle
        entry: bash -c 'nix build .#checks.x86_64-linux.typstyle'
        language: system
      - id: check-build
        name: Build resume
        entry: bash -c 'nix build .#checks.x86_64-linux.build'
        language: system
      - id: check-spelling
        name: Check spelling
        entry: bash -c 'nix build .#checks.x86_64-linux.spell'
        language: system
